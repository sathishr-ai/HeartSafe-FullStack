name: chd_flutter_app
description: HeartSafe - Coronary Heart Disease Risk Prediction App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0
  shared_preferences: ^2.2.2
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  fl_chart: ^0.68.0
  pdf: ^3.11.3
  path_provider: ^2.1.5
  share_plus: ^12.0.1
  shimmer: ^3.0.0
  file_picker: ^10.3.10
  http_parser: ^4.1.2
  csv: ^7.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/images/
